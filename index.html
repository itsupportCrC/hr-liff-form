    .card-body { padding: 16px; }
    .field { margin-bottom: 16px; }

    .field label .required { color: #e53e3e; margin-left: 2px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 13px; border: 1.5px solid #ddd; border-radius: 10px;

      -webkit-appearance: none; appearance: none;

    .field textarea { height: 90px; resize: none; }
    .field.error input, .field.error select, .field.error textarea { border-color: #e53e3e; }
    .field .error-msg { color: #e53e3e; font-size: 0.78rem; margin-top: 4px; display: none; }
    .field.error .error-msg { display: block; }

    .photo-section h3 { font-size: 0.9rem; font-weight: 600; color: #333; margin-bottom: 10px; }
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .photo-slot { border: 2px dashed #ddd; border-radius: 10px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fafafa; }
    .photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .photo-slot .placeholder { font-size: 1.8rem; color: #ccc; }
    .photo-slot .remove-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: none; }

    .btn-submit { display: block; width: calc(100% - 32px); margin: 0 16px 16px; padding: 15px; background: #1A6B1A; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .loading { display: none; text-align: center; padding: 40px 16px; color: #666; }
    .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #1A6B1A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }

    .success-wrap { display: none; text-align: center; padding: 40px 24px; }
    .success-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .success-wrap h2 { color: #1A6B1A; font-size: 1.2rem; margin-bottom: 8px; }

    .error-page { display: none; text-align: center; padding: 40px 24px; }

  const photoFiles = [null, null, null, null];

  function findTopic() {
    if (GAS_TOPIC && GAS_TOPIC.trim()) return GAS_TOPIC.trim();
    const s = new URLSearchParams(window.location.search);
    if (s.get("topic")) return s.get("topic");
    const ls = s.get("liff.state") || "";
    if (ls) {
      try {
        const m = decodeURIComponent(ls).match(/topic=(\d+)/);
        if (m) return m[1];
      } catch(e) {}
    }
    return "";
  }

  function withTimeout(p, ms) {
    return Promise.race([p, new Promise(function(_, r) {
      setTimeout(function() { r(new Error("timeout")); }, ms);
    })]);
  }

  async function init() {
    document.getElementById("loadingSection").style.display = "block";
    TOPIC = findTopic();

    const failsafe = setTimeout(function() {
      if (!liffReady) {
        console.warn("LIFF timeout — no userId");
        showForm();
      }
    }, 7000);

    try {
      await withTimeout(liff.init({ liffId: LIFF_ID }), 6000);

      if (!liff.isLoggedIn()) {
        clearTimeout(failsafe);
        liff.login({ redirectUri: window.location.href });
        return;
      }

      // วิธี 1: IDToken (เร็วที่สุด)
      try {
        idToken = liff.getIDToken() || "";
        if (idToken) {
          const decoded = liff.getDecodedIDToken();
          if (decoded && decoded.sub) {
            userId = decoded.sub;
            console.log("userId IDToken:", userId);
          }
        }
      } catch(te) { console.warn("IDToken:", te); }

      // วิธี 2: getProfile fallback
      if (!userId) {
        try {
          const profile = await withTimeout(liff.getProfile(), 5000);
          userId = profile.userId || "";
          idToken = liff.getIDToken() || idToken;
          console.log("userId profile:", userId);
        } catch(pe) { console.warn("getProfile:", pe); }
      }

    } catch(e) {
      console.warn("LIFF:", e.message || e);
    }

    clearTimeout(failsafe);
    showForm();
  }

  function showForm() {
    if (liffReady) return;
    liffReady = true;
    document.getElementById("loadingSection").style.display = "none";
    if (!TOPIC || !FLOWS[TOPIC]) {
      document.getElementById("errorPage").style.display = "block";
      return;
    }
    document.getElementById("formSection").style.display = "block";
    renderForm();

    // Auto-fill: ดึง UserProfile จาก GAS ด้วย userId ที่ได้จาก LIFF
    if (userId) {
      fetchAndAutoFill(userId);
    } else if (userProfile && userProfile["รหัสพนักงาน"]) {
      autoFillFromProfile(userProfile);
    }
  }

  function renderForm() {
    const flow = FLOWS[TOPIC];
    document.getElementById("headerIcon").textContent  = flow.icon;
    document.getElementById("headerTitle").textContent = flow.title;
    document.getElementById("formTitle").textContent   = flow.title + " — กรอกข้อมูลค่ะ";

    const container = document.getElementById("formFields");
    container.innerHTML = "";

    flow.fields.forEach(function(field, i) {
      const div = document.createElement("div");
      div.className = "field";
      div.id = "field_" + i;

      let input = "";

      if (field.type === "company") {
        const opts = Object.keys(COMPANY_BRANCH).map(function(c) {
          return '<option value="' + c + '">' + c + '</option>';
        }).join("");
        input = '<select id="f_' + i + '" onchange="onCompanyChange()">'
          + '<option value="">— กรุณาเลือกบริษัท —</option>' + opts + '</select>';

      } else if (field.type === "branch") {
        input = '<select id="f_' + i + '" id="branchSelect">'
          + '<option value="">— เลือกบริษัทก่อน —</option></select>';

      } else if (field.type === "select") {
        const opts = field.opts.map(function(o) {
          return '<option value="' + o + '">' + o + '</option>';
        }).join("");
        input = '<select id="f_' + i + '"><option value="">— กรุณาเลือก —</option>' + opts + '</select>';

      } else if (field.type === "textarea") {
        input = '<textarea id="f_' + i + '" placeholder="' + (field.placeholder || "") + '"></textarea>';

      } else {
        input = '<input type="' + (field.type || "text") + '" id="f_' + i + '" placeholder="' + (field.placeholder || "") + '">';
      }

      const isRequired = field.type !== "branch" || Object.values(COMPANY_BRANCH).some(function(b) { return b.length > 0; });
      div.innerHTML = '<label>' + field.label
        + (field.type !== "branch" ? ' <span class="required">*</span>' : ' <span style="color:#888;font-size:0.8rem">(ถ้ามี)</span>')
        + '</label>' + input + '<div class="error-msg">กรุณากรอกข้อมูลนี้ค่ะ</div>';
      container.appendChild(div);
    });

    // Photo section สำหรับ topic 3
    if (flow.hasPhoto) {
      document.getElementById("photoSection").style.display = "block";
      renderPhotoGrid();
    }
  }

  function onCompanyChange() {
    const flow = FLOWS[TOPIC];
    const companyIdx = flow.fields.findIndex(function(f) { return f.type === "company"; });
    const branchIdx  = flow.fields.findIndex(function(f) { return f.type === "branch"; });
    if (companyIdx < 0 || branchIdx < 0) return;

    const companyEl = document.getElementById("f_" + companyIdx);
    const branchEl  = document.getElementById("f_" + branchIdx);
    const company   = companyEl ? companyEl.value : "";
    const branches  = COMPANY_BRANCH[company] || [];

    if (branchEl) {
      if (branches.length === 0) {
        branchEl.innerHTML = '<option value="ไม่มีสาขา">ไม่มีสาขา</option>';
        branchEl.disabled = true;
      } else {
        branchEl.disabled = false;
        branchEl.innerHTML = '<option value="">— กรุณาเลือกสาขา —</option>'
          + branches.map(function(b) { return '<option value="' + b + '">' + b + '</option>'; }).join("");
      }
    }
  }

  function renderPhotoGrid() {
    const grid = document.getElementById("photoGrid");
    grid.innerHTML = "";
    for (let i = 0; i < 4; i++) {
      const slot = document.createElement("div");
      slot.className = "photo-slot";
      slot.id = "slot_" + i;
      slot.innerHTML = '<span class="placeholder">📷</span>'
        + '<input type="file" accept="image/*" onchange="onPhotoSelect(event,' + i + ')">'
        + '<button class="remove-btn" onclick="removePhoto(' + i + ')">✕</button>';
      grid.appendChild(slot);
    }
  }

  function onPhotoSelect(event, idx) {
    const file = event.target.files[0];
    if (!file) return;
    photoFiles[idx] = file;
    const slot = document.getElementById("slot_" + idx);
    const reader = new FileReader();
    reader.onload = function(e) {
      slot.innerHTML = '<img src="' + e.target.result + '">'
        + '<button class="remove-btn" onclick="removePhoto(' + idx + ')">✕</button>';
      slot.classList.add("has-image");
    };
    reader.readAsDataURL(file);
  }

  function removePhoto(idx) {
    photoFiles[idx] = null;
    const slot = document.getElementById("slot_" + idx);
    slot.className = "photo-slot";
    slot.innerHTML = '<span class="placeholder">📷</span>'
      + '<input type="file" accept="image/*" onchange="onPhotoSelect(event,' + idx + ')">'
      + '<button class="remove-btn" onclick="removePhoto(' + idx + ')">✕</button>';
  }

  async function toBase64(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.onload  = function() { resolve(reader.result.split(",")[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function submitForm() {
    if (!liffReady) { alert("กรุณารอสักครู่ค่ะ"); return; }

    const flow = FLOWS[TOPIC];
    const answers = {};
    let valid = true;

    flow.fields.forEach(function(field, i) {
      const el  = document.getElementById("f_" + i);
      const val = el ? el.value.trim() : "";
      const div = document.getElementById("field_" + i);
      const isBranch = field.type === "branch";

      if (!val && !isBranch) {
        div.classList.add("error"); valid = false;
      } else {
        div.classList.remove("error");
        answers[field.key] = val;
      }
    });

    if (!valid) { window.scrollTo({ top: 0, behavior: "smooth" }); return; }

    document.getElementById("formSection").style.display   = "none";
    document.getElementById("loadingSection").style.display = "block";

    // อัปโหลดรูป (topic 3)
    let photoLinks = [];
    if (flow.hasPhoto) {
      const photos = photoFiles.filter(function(f) { return f !== null; });
      for (let i = 0; i < photos.length; i++) {
        document.getElementById("loadingText").textContent = "กำลังอัปโหลดรูป " + (i+1) + "/" + photos.length + "...";
        try {
          const b64  = await toBase64(photos[i]);
          const res  = await fetch(GAS_URL + "?action=upload", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: photos[i].name, mimeType: photos[i].type, data: b64 }),
          });
          const data = await res.json();
          if (data.link) photoLinks.push(data.link);
        } catch(err) {
          console.warn("upload failed:", err);
        }
      }
      answers["ลิงก์รูปภาพ"] = photoLinks.join("\n");
    }

    document.getElementById("loadingText").textContent = "กำลังส่งข้อมูล กรุณารอสักครู่...";

    try {
      const params = new URLSearchParams({
        action:  "submit",
        topic:   TOPIC,
        userId:  userId,
        idToken: idToken,
        answers: JSON.stringify(answers),
      });
      // GAS ไม่รองรับ CORS header → ใช้ no-cors แล้วแสดง success เลย
      // (GAS จะรับข้อมูลและบันทึก Sheet แม้จะ no-cors)
      await fetch(GAS_URL + "?" + params.toString(), { mode: "no-cors" });

      document.getElementById("loadingSection").style.display = "none";
      document.getElementById("successMsg").textContent = flow.ack.replace(/\n/g, " ");
      document.getElementById("refBadge").textContent   = "กำลังดำเนินการค่ะ";
      document.getElementById("successSection").style.display = "block";
    } catch(err) {
      document.getElementById("loadingSection").style.display = "none";
      document.getElementById("formSection").style.display    = "block";
      alert("เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้งค่ะ");
    }
  }

  // ดึง UserProfile จาก GAS หลัง LIFF login เสร็จ
  // ใช้ JSONP แทน fetch เพื่อเลี่ยง CORS
  function fetchAndAutoFill(uid) {
    if (!uid) return;
    const callbackName = "gasCallback_" + Date.now();
    window[callbackName] = function(data) {
      if (data && data.profile) autoFillFromProfile(data.profile);
      delete window[callbackName];
      const s = document.getElementById("gasScript");
      if (s) s.remove();
    };
    const script = document.createElement("script");
    script.id  = "gasScript";
    script.src = GAS_URL + "?action=profile&userId=" + encodeURIComponent(uid) + "&callback=" + callbackName;
    document.head.appendChild(script);
  }

  // Auto-fill ฟอร์มจาก UserProfile
  function autoFillFromProfile(profile) {
    if (!profile || Object.keys(profile).length === 0) return;
    const flow = FLOWS[TOPIC];
    if (!flow) return;
    console.log("autoFill profile:", JSON.stringify(profile));

    flow.fields.forEach(function(field, i) {
      const el = document.getElementById("f_" + i);
      if (!el) return;

      if (field.type === "company") {
        const val = profile["บริษัท"] || "";
        if (val) {
          el.value = val;
          onCompanyChange();
          // รอ branch render แล้ว set สาขา
          setTimeout(function() {
            const branchIdx = flow.fields.findIndex(function(f) { return f.type === "branch"; });
            if (branchIdx >= 0) {
              const branchEl = document.getElementById("f_" + branchIdx);
              if (branchEl && profile["สาขา"]) branchEl.value = profile["สาขา"];
            }
          }, 200);
        }
      } else if (field.type === "branch") {
        // จัดการผ่าน company timeout ด้านบน
      } else {
        const val = profile[field.key] || "";
        if (val) el.value = val;
      }
    });
  }

  function closeLiff() {
    if (liff.isInClient()) { liff.closeWindow(); }
    else { window.close(); }
  }

  window.addEventListener("load", init);
</script>
</body>
</html>
