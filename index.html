    .field.error input, .field.error select, .field.error textarea { border-color: #e53e3e; }
    .field .error-msg { color: #e53e3e; font-size: 0.78rem; margin-top: 4px; display: none; }
    .field.error .error-msg { display: block; }

    .photo-section { margin: 0 16px 16px; }
    .photo-section h3 { font-size: 0.9rem; font-weight: 600; color: #333; margin-bottom: 10px; }
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .photo-slot { border: 2px dashed #ddd; border-radius: 10px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fafafa; }
    .photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .photo-slot .placeholder { font-size: 1.8rem; color: #ccc; }
    .exp-selected { border-color: #1A6B1A !important; background: #EAF3DE !important; }
    .exp-type-item input[type=checkbox], .vehicle-chk input[type=checkbox] {

    .file-item input[type=file] { flex: 1; font-size: 0.85rem; font-family: inherit; border: none; background: transparent; }
    .file-item .file-name { flex: 1; font-size: 0.85rem; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .photo-slot.has-image .remove-btn { display: flex; align-items: center; justify-content: center; }
    .btn-submit { display: block; width: calc(100% - 32px); margin: 0 16px 16px; padding: 15px; background: #1A6B1A; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; }

    .loading { display: none; text-align: center; padding: 40px 16px; color: #666; }

</head>

<div class="header">
  <div class="icon" id="headerIcon">📋</div>
  <h1 id="headerTitle">HR One Stop Service</h1>
  <p>ฝ่ายบุคคลยินดีให้บริการค่ะ</p>
</div>

<div id="formSection" style="display:none;">

    <div class="card-header" id="formTitle">กรุณากรอกข้อมูลให้ครบถ้วนค่ะ</div>
    <div class="card-body" id="formFields"></div>
  </div>
  <div id="photoSection" class="photo-section" style="display:none;">
    <h3 id="photoSectionTitle">📷 แนบรูปภาพ</h3>

  </div>
  <div id="fileSection" class="file-section" style="display:none;">

    <button class="btn-add-file" id="btnAddFile" onclick="addFileSlot()">+ เพิ่มไฟล์</button>
  </div>
  <button class="btn-submit" onclick="submitForm()">✅ ยืนยันการส่ง</button>
</div>

<div class="loading" id="loadingSection">
  <div class="spinner"></div>
  <p id="loadingText">กำลังโหลด กรุณารอสักครู่...</p>
  <p class="progress-text" id="progressText"></p>
</div>

<div class="card" id="successSection" style="display:none; margin:16px;">

    <button class="btn-close" onclick="closeLiff()">ปิดหน้าต่างนี้</button>
  </div>
</div>

<div class="card" id="errorPage" style="display:none; margin:16px;">

  function findTopic() {
    if (GAS_TOPIC && GAS_TOPIC.trim()) return GAS_TOPIC.trim();
    const s = new URLSearchParams(window.location.search);
    if (s.get("topic")) return s.get("topic");
    const ls = s.get("liff.state") || "";
    if (ls) {
      try {
        const m = decodeURIComponent(ls).match(/topic=(\d+)/);
        if (m) return m[1];
      } catch(e) {}
    }
    return "";
  }

  function withTimeout(p, ms) {
    return Promise.race([p, new Promise(function(_, r) {
      setTimeout(function() { r(new Error("timeout")); }, ms);
    })]);
  }

  async function init() {
    document.getElementById("loadingSection").style.display = "block";
    TOPIC = findTopic();

    const failsafe = setTimeout(function() {
      if (!liffReady) {
        console.warn("LIFF timeout — no userId");
        showForm();
      }
    }, 7000);

    try {
      await withTimeout(liff.init({ liffId: LIFF_ID }), 6000);

      if (!liff.isLoggedIn()) {
        clearTimeout(failsafe);
        liff.login({ redirectUri: window.location.href });
        return;
      }

      // วิธี 1: IDToken (เร็วที่สุด)
      try {
        idToken = liff.getIDToken() || "";
        if (idToken) {
          const decoded = liff.getDecodedIDToken();
          if (decoded && decoded.sub) {
            userId = decoded.sub;
            console.log("userId IDToken:", userId);
          }
        }
      } catch(te) { console.warn("IDToken:", te); }

      // วิธี 2: getProfile fallback
      if (!userId) {
        try {
          const profile = await withTimeout(liff.getProfile(), 5000);
          userId = profile.userId || "";
          idToken = liff.getIDToken() || idToken;
          console.log("userId profile:", userId);
        } catch(pe) { console.warn("getProfile:", pe); }
      }

    } catch(e) {
      console.warn("LIFF:", e.message || e);
    }

    clearTimeout(failsafe);
    showForm();
  }

  // Conditional Field — แสดง/ซ่อน field ตามค่าที่เลือก
  function onConditionalChange(fieldIdx) {
    const flow  = FLOWS[TOPIC];
    const field = flow.fields[fieldIdx];
    if (!field || !field.conditional) return;

    const el  = document.getElementById("f_" + fieldIdx);
    const val = el ? el.value : "";

    // ลบ conditional field เดิมออก
    const existing = document.getElementById("conditional_" + fieldIdx);
    if (existing) existing.remove();

    // ซ่อน/แสดง field ที่มี hideWhen
    flow.fields.forEach(function(f, fi) {
      if (f.hideWhen && f.hideWhen.includes(val)) {
        const hw = document.getElementById("field_" + fi);
        if (hw) hw.style.display = "none";
      } else if (f.hideWhen) {
        const hw = document.getElementById("field_" + fi);
        if (hw) hw.style.display = "";
      }
    });

    // ถ้าเลือกค่าที่มี conditional
    const condDef = field.conditional[val];
    if (!condDef) return;

    const div = document.createElement("div");
    div.id = "conditional_" + fieldIdx;

    // รองรับ type: "multi" (หลาย fields)
    if (condDef.type === "multi" && condDef.fields) {
      let html = "";
      condDef.fields.forEach(function(cf, ci) {
        let input = "";
        if (cf.type === "select") {
          const opts = cf.opts.map(function(o) { return '<option value="' + o + '">' + o + '</option>'; }).join("");
          input = '<select id="fmc_' + fieldIdx + '_' + ci + '"><option value="">— กรุณาเลือก —</option>' + opts + '</select>';
        } else if (cf.type === "textarea") {
          input = '<textarea id="fmc_' + fieldIdx + '_' + ci + '" placeholder="' + (cf.placeholder||"") + '" rows="3"></textarea>';
        } else {
          input = '<input type="text" id="fmc_' + fieldIdx + '_' + ci + '" placeholder="' + (cf.placeholder||"") + '">';
        }
        html += '<div class="field" style="margin-bottom:8px;">'
          + '<label>' + cf.label + ' <span class="required">*</span></label>'
          + input + '<div class="error-msg">กรุณากรอกข้อมูลนี้ค่ะ</div></div>';
      });
      div.innerHTML = html;
    } else {
      // single conditional field
      let input = "";
      if (condDef.type === "select") {
        const opts = condDef.opts.map(function(o) { return '<option value="' + o + '">' + o + '</option>'; }).join("");
        input = '<select id="fc_' + fieldIdx + '"><option value="">— กรุณาเลือก —</option>' + opts + '</select>';
      } else if (condDef.type === "textarea") {
        input = '<textarea id="fc_' + fieldIdx + '" placeholder="' + (condDef.placeholder||"") + '" rows="3"></textarea>';
      } else {
        input = '<input type="text" id="fc_' + fieldIdx + '" placeholder="' + (condDef.placeholder||"") + '">';
      }
      div.innerHTML = '<div class="field"><label>' + condDef.label + ' <span class="required">*</span></label>'
        + input + '<div class="error-msg">กรุณากรอกข้อมูลนี้ค่ะ</div></div>';
    }

    // แทรกหลัง field ปัจจุบัน
    const parentField = document.getElementById("field_" + fieldIdx);
    if (parentField && parentField.nextSibling) {
      parentField.parentNode.insertBefore(div, parentField.nextSibling);
    } else if (parentField) {
      parentField.parentNode.appendChild(div);
    }

    // แสดง photoSection เมื่อเลือก แจ้งทำความดี
    const photoSec = document.getElementById("photoSection");
    if (val === "แจ้งทำความดี") {
      if (photoSec) {
        photoSec.style.display = "block";
        const title = document.getElementById("photoSectionTitle");
        if (title) title.textContent = "📷 แนบรูปภาพ (กด + เพื่อเพิ่ม)";
        if (document.getElementById("photoGrid").children.length === 0) addPhotoSlot();
      }
    } else {
      // ซ่อน photoSection ถ้าเลือกอย่างอื่น (ยกเว้น topic ที่มี hasPhoto เอง)
      const flow = FLOWS[TOPIC];
      if (photoSec && !flow.hasPhoto) photoSec.style.display = "none";
    }
  }

  // Compress รูปก่อนส่ง → ลดขนาดจาก 3-5MB เหลือ ~200KB
  async function toBase64(file) {
    return new Promise(function(resolve, reject) {
      const img    = new Image();
      const reader = new FileReader();

      reader.onload = function(e) {
        img.onload = function() {
          // ลดขนาดสูงสุด 800px
          const MAX = 800;
          let w = img.width;
          let h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement("canvas");
          canvas.width  = w;
          canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          // compress เป็น JPEG quality 0.7
          const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
          resolve(dataUrl.split(",")[1]);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function submitForm() {
    if (!liffReady) { alert("กรุณารอสักครู่ค่ะ"); return; }

    const flow = FLOWS[TOPIC];
    const answers = {};
    let valid = true;

    flow.fields.forEach(function(field, i) {
      // หา element — date ของ topic 7 ใช้ id พิเศษ
      let el;
      if (field.key === "วันที่เริ่มเดินทาง")           el = document.getElementById("t7_dateFrom");
      else if (field.key === "วันที่สิ้นสุดการเดินทาง") el = document.getElementById("t7_dateTo");
      else if (field.key === "จำนวนวัน")                el = document.getElementById("t7_numDays");
      else if (field.key === "จำนวนคืน")               el = document.getElementById("t7_numNights");
      else if (field.key === "รวมค่าใช้จ่าย")           el = document.getElementById("t7_totalCost");
      else                                               el = document.getElementById("f_" + i);

      const div = document.getElementById("field_" + i);
      const isBranch   = field.type === "branch";
      const isOptional = field.required === false;
      const isSpecial  = ["travelers","expenseType","expenseRows","vehicleCheck","timeTH","totalCost"].includes(field.type);
      const isReadonly = el && el.hasAttribute && el.hasAttribute('readonly');

      // ถ้า field ไม่มี element จริง (conditional field ที่ render โดย onConditionalChange) → ข้าม
      if (!el && !div && !isSpecial) return;

      const val = el ? el.value.trim() : "";

      if (!val && !isBranch && !isOptional && !isSpecial && !isReadonly) {
        if (div) { div.classList.add("error"); valid = false; }
      } else {
        if (div) div.classList.remove("error");
        if (!isSpecial) answers[field.key] = val;
      }

      // เก็บค่า special types ของ Topic 7
      if (field.type === "travelers") {
        answers["ผู้เดินทางร่วม"] = getTravelersData();
        return;
      }
      if (field.type === "expenseType") {
        answers["ประเภทการเบิก"]      = getExpenseTypes();
        answers["หน่วยงานที่จัดให้"]  = document.getElementById("agencyInput")?.value || "";
        answers["รายการค่าเบี้ยเลี้ยง"] = getExpenseRowsData();
        const costEl = document.getElementById('t7_totalCost');
        if (costEl) answers["รวมค่าใช้จ่าย"] = costEl.value.replace(' บาท','').replace(/,/g,'');
        return;
      }
      if (field.type === "expenseRows") return;
      if (field.type === "vehicleCheck") {
        answers["พาหนะเดินทาง"] = getVehicles();
        return;
      }
      if (field.type === "timeTH") {
        const el2 = document.getElementById("f_" + i);
        answers[field.key] = el2 ? el2.value : "";
        return;
      }

      // เก็บค่า conditional field ถ้ามี
      if (field.conditional) {
        const condDef = field.conditional[val];
        if (condDef) {
          if (condDef.type === "multi" && condDef.fields) {
            // multi fields
            condDef.fields.forEach(function(cf, ci) {
              const mEl = document.getElementById("fmc_" + i + "_" + ci);
              if (mEl) answers[cf.key] = mEl.value.trim();
            });
          } else {
            // single conditional
            const condEl = document.getElementById("fc_" + i);
            if (condEl) answers[condDef.key] = condEl.value.trim();
          }
        }
      }
    });

    if (!valid) { window.scrollTo({ top: 0, behavior: "smooth" }); return; }

    document.getElementById("formSection").style.display   = "none";
    document.getElementById("loadingSection").style.display = "block";

    // อัปโหลดรูป (topic 3) — ใช้ JSONP เพื่อเลี่ยง CORS
    let photoLinks = [];
    if (flow.hasPhoto) {
      const photos = photoFiles.filter(function(f) { return f !== null; });
      for (let i = 0; i < photos.length; i++) {
        document.getElementById("loadingText").textContent = "กำลังอัปโหลดรูป " + (i+1) + "/" + photos.length + "...";
        try {
          const b64  = await toBase64(photos[i]);
          // ส่ง base64 ผ่าน JSONP GET (แบ่งเป็น chunks ถ้าใหญ่เกิน)
          const result = await uploadViaJSONP({
            name:     photos[i].name,
            mimeType: photos[i].type,
            data:     b64,
          });
          if (result && result.link) photoLinks.push(result.link);
        } catch(err) {
          console.warn("upload failed:", err);
        }
      }
      answers["ลิงก์รูปภาพ"] = photoLinks.join("\n");
    }

    // อัปโหลดไฟล์แนบ (topic 4)
    if (flow.hasFile) {
      const fileLinks = await uploadFilesToCloudinary();
      if (fileLinks.length > 0) answers["ลิงก์เอกสารแนบ"] = fileLinks.join("\n");
    }

    document.getElementById("loadingText").textContent = "กำลังส่งข้อมูล กรุณารอสักครู่...";

    try {
      const params = new URLSearchParams({
        action:  "submit",
        topic:   TOPIC,
        userId:  userId,
        idToken: idToken,
        answers: JSON.stringify(answers),
      });
      // ใช้ JSONP submit เพื่อเลี่ยง CORS
      const result = await submitViaJSONP(GAS_URL + "?" + params.toString());

      document.getElementById("loadingSection").style.display = "none";
      if (result && result.status === "ok") {
        document.getElementById("successMsg").textContent = flow.ack.replace(/\n/g, " ");
        document.getElementById("refBadge").textContent   = "เลขที่: " + (result.refNo || "-");
        document.getElementById("successSection").style.display = "block";
      } else {
        throw new Error("Server error");
      }
    } catch(err) {
      document.getElementById("loadingSection").style.display = "none";
      document.getElementById("formSection").style.display    = "block";
      alert("เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้งค่ะ");
    }
  }

  // ดึง UserProfile จาก GAS หลัง LIFF login เสร็จ
  // Upload รูปผ่าน Cloudinary (ไม่ติด CORS)
  const CLOUDINARY_CLOUD  = "dmniqiet7";
  const CLOUDINARY_PRESET = "np9mbto9";

  async function uploadViaJSONP(fileData) {
    const url  = "https://api.cloudinary.com/v1_1/" + CLOUDINARY_CLOUD + "/image/upload";
    const body = new FormData();
    body.append("upload_preset", CLOUDINARY_PRESET);
    body.append("folder", "hr-accident");
    // แปลง base64 กลับเป็น blob
    const byteStr = atob(fileData.data);
    const arr = new Uint8Array(byteStr.length);
    for (let i = 0; i < byteStr.length; i++) arr[i] = byteStr.charCodeAt(i);
    const blob = new Blob([arr], { type: fileData.mimeType || "image/jpeg" });
    body.append("file", blob, fileData.name || "photo.jpg");

    const res  = await fetch(url, { method: "POST", body: body });
    const data = await res.json();
    if (data.secure_url) {
      return { link: data.secure_url };
    }
    throw new Error("Cloudinary error: " + JSON.stringify(data));
  }

  // JSONP submit
  function submitViaJSONP(url) {
    return new Promise(function(resolve, reject) {
      const cbName = "gasSubmit_" + Date.now();
      const timeout = setTimeout(function() {
        delete window[cbName];
        reject(new Error("timeout"));
      }, 15000);

      window[cbName] = function(data) {
        clearTimeout(timeout);
        delete window[cbName];
        const s = document.getElementById("submitScript");
        if (s) s.remove();
        resolve(data);
      };

      const script = document.createElement("script");
      script.id  = "submitScript";
      script.src = url + "&callback=" + cbName;
      script.onerror = function() {
        clearTimeout(timeout);
        delete window[cbName];
        reject(new Error("script error"));
      };
      document.head.appendChild(script);
    });
  }

  function removeTraveler(idx) {
    document.getElementById('traveler_' + idx)?.remove();
    travelerCount = Math.max(0, travelerCount - 1);
  }

  function getTravelersData() {
    const result = [];
    document.querySelectorAll('[id^="traveler_"]').forEach(function(div) {
      const id = div.id.split('_')[1];
      const name = document.getElementById('tr'+id+'_name')?.value || '';
      const pos  = document.getElementById('tr'+id+'_pos')?.value  || '';
      const dept = document.getElementById('tr'+id+'_dept')?.value || '';
      if (name) result.push(name + ' (' + pos + '/' + dept + ')');
    });
    return result.join(', ');
  }

  function onExpenseTypeCheck(cb) {
    cb.closest('.exp-type-item').classList.toggle('exp-selected', cb.checked);
    const anyChecked = document.querySelectorAll('.exp-type-item input:checked').length > 0;
    const onlyChecked = document.getElementById('chk-only')?.checked;
    // ซ่อน/แสดง agencySection และ field หน่วยงานที่จัดให้
    document.getElementById('agencySection').style.display = onlyChecked ? 'block' : 'none';
    document.querySelectorAll('#formFields .field').forEach(function(div) {
      const lbl = div.querySelector('label')?.textContent || '';
      if (lbl.includes('หน่วยงานที่จัดให้')) {
        div.style.display = onlyChecked ? 'block' : 'none';
      }
    });
    document.getElementById('levelSection').style.display = anyChecked ? 'block' : 'none';
  }

  function toggleExpLevel(type, show) {
    document.getElementById('lbl-' + type).classList.toggle('exp-selected', show);
    document.getElementById(type + 'Rows').style.display = show ? 'block' : 'none';
    if (show && document.getElementById(type + 'Items').children.length === 0) addExpRow(type);
  }

  function addExpRow(type) {
    expenseRows[type]++;
    const idx = expenseRows[type];
    const div = document.createElement('div');
    div.id = type + 'row' + idx;
    div.style.cssText = 'margin-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:8px;';
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:11px;color:var(--color-text-tertiary);">รายการที่ ${idx}</span>
        ${idx > 1 ? `<button onclick="document.getElementById('${type}row${idx}').remove();calcExpTotal();" style="background:none;border:none;color:var(--color-text-tertiary);font-size:12px;cursor:pointer;">ลบ</button>` : ''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;">
        <div><input type="number" placeholder="0" min="0" oninput="calcExpRow('${type}',${idx})" id="${type}r${idx}a" style="padding:6px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;text-align:center;width:100%;background:var(--color-background-primary);color:var(--color-text-primary);">
          <p style="font-size:10px;color:var(--color-text-tertiary);text-align:center;margin-top:2px;">บาท/วัน</p></div>
        <div><input type="number" placeholder="0" min="0" oninput="calcExpRow('${type}',${idx})" id="${type}r${idx}b" style="padding:6px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;text-align:center;width:100%;background:var(--color-background-primary);color:var(--color-text-primary);">
          <p style="font-size:10px;color:var(--color-text-tertiary);text-align:center;margin-top:2px;">คน</p></div>
        <div><input type="number" placeholder="0" min="0" oninput="calcExpRow('${type}',${idx})" id="${type}r${idx}c" style="padding:6px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;text-align:center;width:100%;background:var(--color-background-primary);color:var(--color-text-primary);">
          <p style="font-size:10px;color:var(--color-text-tertiary);text-align:center;margin-top:2px;">วัน</p></div>
        <div><div id="${type}r${idx}s" style="background:#EAF3DE;color:#27500A;border:0.5px solid #b7d9a0;border-radius:var(--border-radius-md);padding:6px;font-size:12px;font-weight:500;text-align:center;">0</div>
          <p style="font-size:10px;color:var(--color-text-tertiary);text-align:center;margin-top:2px;">บาท</p></div>
      </div>`;
    document.getElementById(type + 'Items').appendChild(div);
  }

  function calcExpRow(type, idx) {
    const a = parseFloat(document.getElementById(type+'r'+idx+'a')?.value) || 0;
    const b = parseFloat(document.getElementById(type+'r'+idx+'b')?.value) || 0;
    const c = parseFloat(document.getElementById(type+'r'+idx+'c')?.value) || 0;
    const el = document.getElementById(type+'r'+idx+'s');
    if (el) el.textContent = Math.round(a*b*c).toLocaleString();
    calcExpTotal();
  }

  function calcExpTotal() {
    let t = 0;
    document.querySelectorAll('[id$="s"][id^="mgr"],[id$="s"][id^="head"],[id$="s"][id^="staff"]')
      .forEach(el => { if (!el.classList.contains('sum-header')) t += parseFloat(el.textContent.replace(/,/g,'')) || 0; });
    const totalEl = document.getElementById('expGrandTotal');
    if (totalEl) totalEl.textContent = Math.round(t).toLocaleString() + ' บาท';
    const costEl = document.getElementById('t7_totalCost');
    if (costEl) costEl.value = Math.round(t).toLocaleString() + ' บาท';
  }

  function getExpenseTypes() {
    return Array.from(document.querySelectorAll('.exp-type-item input:checked')).map(cb => cb.value).join(', ');
  }

  function getExpenseRowsData() {
    const result = [];
    ['mgr','head','staff'].forEach(function(type) {
      const labels = { mgr: 'ผจก./ผอ.', head: 'หัวหน้า/ผู้ช่วย', staff: 'พนักงาน' };
      const rows = document.getElementById(type + 'Items');
      if (!rows || rows.style.display === 'none') return;
      let total = 0;
      rows.querySelectorAll('[id$="s"]').forEach(el => total += parseFloat(el.textContent.replace(/,/g,'')) || 0);
      if (total > 0) result.push(labels[type] + ': ' + total.toLocaleString() + ' บาท');
    });
    return result.join(' | ');
  }

  function getVehicles() {
    return Array.from(document.querySelectorAll('.vehicle-chk input:checked')).map(cb => cb.value).join(', ');
  }

  // ===== File Upload (topic 4) =====
  const fileItems = []; // { file, slot }
  const MAX_FILES = 4;

  function renderFileSectionIfNeeded() {
    const flow = FLOWS[TOPIC];
    if (flow && flow.hasPhoto) {
      const sec = document.getElementById("photoSection");
      sec.style.display = "block";
      // แก้ title ตาม topic
      const title = document.getElementById("photoSectionTitle");
      if (title) title.textContent = "📷 แนบรูปภาพ (กด + เพื่อเพิ่ม)";
      // เพิ่ม slot แรกอัตโนมัติ
      if (document.getElementById("photoGrid").children.length === 0) addPhotoSlot();
    }
    if (flow && flow.hasFile) {
      document.getElementById("fileSection").style.display = "block";
      if (fileItems.length === 0) addFileSlot();
    }
  }

  // เพิ่ม photo slot แบบ dynamic
  let photoSlotCount = 0;
  function addPhotoSlot() {
    photoSlotCount++;
    const idx  = photoSlotCount;
    const grid = document.getElementById("photoGrid");
    const slot = document.createElement("div");
    slot.className = "photo-slot";
    slot.id = "pslot_" + idx;
    slot.style.cssText = "position:relative;border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);aspect-ratio:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;cursor:pointer;overflow:hidden;background:var(--color-background-secondary);";
    slot.innerHTML = '<i class="ti ti-camera" style="font-size:22px;color:var(--color-text-tertiary);" aria-hidden="true"></i>'
      + '<span style="font-size:0.72rem;color:var(--color-text-tertiary);">รูปที่ ' + idx + '</span>'
      + '<input type="file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;" onchange="onPhotoSlotSelect(event,' + idx + ')">'
      + '<button onclick="removePhotoSlot(' + idx + ')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:none;" class="remove-btn">✕</button>';
    grid.appendChild(slot);
    // เก็บ photoFiles ตาม idx
    photoFiles[idx - 1] = null;
  }

  function onPhotoSlotSelect(event, idx) {
    const file = event.target.files[0];
    if (!file) return;
    photoFiles[idx - 1] = file;
    const slot = document.getElementById("pslot_" + idx);
    if (!slot) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      slot.style.backgroundImage = "url(" + e.target.result + ")";
      slot.style.backgroundSize = "cover";
      slot.style.backgroundPosition = "center";
      slot.querySelector('.ti-camera')?.remove();
      slot.querySelector('span')?.remove();
      const rmBtn = slot.querySelector('.remove-btn');
      if (rmBtn) rmBtn.style.display = "block";
    };
    reader.readAsDataURL(file);
  }

  function removePhotoSlot(idx) {
    photoFiles[idx - 1] = null;
    const slot = document.getElementById("pslot_" + idx);
    if (slot) slot.remove();
  }

  function addFileSlot() {
    if (fileItems.length >= MAX_FILES) return;
    const idx  = fileItems.length;
    const item = { file: null };
    fileItems.push(item);

    const div = document.createElement("div");
    div.className = "file-item";
    div.id = "fileItem_" + idx;
    div.innerHTML = '<input type="file" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx" onchange="onFileSelect(event,' + idx + ')" />'
      + '<button class="remove-file" onclick="removeFileSlot(' + idx + ')">✕</button>';
    document.getElementById("fileList").appendChild(div);

    // ซ่อนปุ่มเพิ่มถ้าครบ 4
    if (fileItems.length >= MAX_FILES) {
      document.getElementById("btnAddFile").style.display = "none";
    }
  }

  function onFileSelect(event, idx) {
    const file = event.target.files[0];
    if (!file) return;
    fileItems[idx].file = file;
    const div = document.getElementById("fileItem_" + idx);
    div.innerHTML = '<span class="file-name">📎 ' + file.name + '</span>'
      + '<button class="remove-file" onclick="removeFileSlot(' + idx + ')">✕</button>';
  }

  function removeFileSlot(idx) {
    fileItems.splice(idx, 1);
    // re-render ทั้งหมด
    const list = document.getElementById("fileList");
    list.innerHTML = "";
    const backup = [...fileItems];
    fileItems.length = 0;
    backup.forEach(function(item) {
      addFileSlot();
      if (item.file) fileItems[fileItems.length - 1].file = item.file;
    });
    document.getElementById("btnAddFile").style.display = "flex";
  }

  async function toBase64File(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.onload  = function() { resolve(reader.result.split(",")[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadFilesToCloudinary() {
    const links = [];
    const files = fileItems.filter(function(i) { return i.file; });
    for (let i = 0; i < files.length; i++) {
      document.getElementById("loadingText").textContent = "กำลังอัปโหลดไฟล์ " + (i+1) + "/" + files.length + "...";
      try {
        const file = files[i].file;
        const isImage = file.type.startsWith("image/");
        const b64  = isImage ? await toBase64(file) : await toBase64File(file);
        const type = isImage ? "image" : "raw";
        const url  = "https://api.cloudinary.com/v1_1/" + CLOUDINARY_CLOUD + "/" + type + "/upload";
        const body = new FormData();
        body.append("upload_preset", CLOUDINARY_PRESET);
        body.append("folder", "hr-training");
        const byteStr = atob(b64);
        const arr = new Uint8Array(byteStr.length);
        for (let j = 0; j < byteStr.length; j++) arr[j] = byteStr.charCodeAt(j);
        const blob = new Blob([arr], { type: file.type });
        body.append("file", blob, file.name);
        const res  = await fetch(url, { method: "POST", body: body });
        const data = await res.json();
        if (data.secure_url) links.push(data.secure_url);
      } catch(err) {
        console.warn("upload file failed:", err);
      }
    }
    return links;
  }

  function closeLiff() {
    try {
      if (liff.isInClient()) {
        liff.closeWindow();
      } else {
        window.close();
        // fallback ถ้า window.close() ไม่ทำงาน
        setTimeout(function() {
          document.getElementById("successSection").style.display = "none";
          document.getElementById("formSection").style.display    = "block";
          renderForm();
        }, 500);
      }
    } catch(e) {
      window.close();
    }
  }

  window.addEventListener("load", init);
</script>
